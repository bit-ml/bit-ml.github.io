{{- define "main" }}
<header class="page-header page-header--minimal">
  {{- partial "breadcrumbs.html" . }}
</header>
{{- if .Content }}
<div class="post-content">
  {{- if not (.Param "disableAnchoredHeadings") }}
  {{- partial "anchored_headings.html" .Content -}}
  {{- else }}{{ .Content }}{{ end }}
</div>
{{- end }}
{{- end }}
